<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle·Agenda · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF7F4;--surface:#FFFFFF;--ink:#2A1F2E;--ink-soft:#6B5B6E;--accent:#C9376C;--accent-soft:#F4D5DD;--gold:#B8956A;--line:#EDE5E3;--shadow:0 4px 24px rgba(42,31,46,.06);--shadow-lg:0 12px 40px rgba(42,31,46,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;
  background-image:radial-gradient(circle at 15% 10%,rgba(244,213,221,.5) 0%,transparent 50%),radial-gradient(circle at 90% 90%,rgba(184,149,106,.1) 0%,transparent 40%)}
.card{background:var(--surface);border-radius:24px;padding:48px 44px;max-width:420px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--line)}
.brand{text-align:center;margin-bottom:36px}
.brand h1{font-family:'DM Serif Display';font-size:36px;letter-spacing:-.5px}
.brand h1 em{color:var(--accent);font-style:italic}
.brand p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft);margin-top:8px}
.tab-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--bg);border-radius:12px;padding:5px;margin-bottom:28px}
.tab{border:none;background:none;padding:10px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.2s}
.tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.field{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;font-weight:600}
input{width:100%;padding:13px 14px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:10px;font-family:inherit;font-size:14px;transition:.2s}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.btn{width:100%;padding:14px;border-radius:50px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:.2s;margin-top:8px}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:#A82959;transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,55,108,.3)}
.divider{text-align:center;font-size:12px;color:var(--ink-soft);margin:18px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--line)}
.divider::before{left:0}.divider::after{right:0}
.link{background:none;border:none;color:var(--accent);font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline;display:block;text-align:center;margin-top:14px}
.error{background:#FEE2E2;border:1px solid #FECACA;color:#B91C1C;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <h1>Belle<em>·</em>Agenda</h1>
    <p>Beleza & Saúde · v2.0</p>
  </div>

  <div class="tab-row">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
    <button class="tab" id="tabReg" onclick="switchTab('reg')">Criar conta</button>
  </div>

  <div id="errorBox" class="error"></div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="field"><label>E-mail</label><input id="loginEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
    <button class="link" onclick="doReset()">Esqueci a senha</button>
  </div>

  <!-- REGISTER -->
  <div id="formReg" style="display:none">
    <div class="field"><label>Nome do salão / profissional</label><input id="regName" placeholder="Studio Silva"></div>
    <div class="field"><label>E-mail</label><input id="regEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input id="regPass" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"></div>
    <button class="btn btn-primary" onclick="doRegister()">Criar conta</button>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'app.html';
});

function switchTab(t) {
  document.getElementById('formLogin').style.display = t==='login' ? 'block' : 'none';
  document.getElementById('formReg').style.display = t==='reg' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabReg').classList.toggle('active', t==='reg');
  showError('');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

const msgs = {
  'auth/user-not-found': 'E-mail não cadastrado.',
  'auth/wrong-password': 'Senha incorreta.',
  'auth/email-already-in-use': 'E-mail já cadastrado.',
  'auth/weak-password': 'Senha muito fraca (mín. 6 caracteres).',
  'auth/invalid-email': 'E-mail inválido.',
  'auth/invalid-credential': 'E-mail ou senha incorretos.',
};

function friendly(e) { return msgs[e.code] || e.message; }

async function doLogin() {
  showError('');
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showError('Preencha e-mail e senha.'); return; }
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) { showError(friendly(e)); }
}

async function doRegister() {
  showError('');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showError('Preencha todos os campos.'); return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).collection('settings').doc('profile').set({
      salonName: name, pixKey: '', pixName: name.substring(0,25), pixCity: 'Cidade', professionalName: name.split(' ')[0]
    });
    await db.collection('users').doc(cred.user.uid).collection('services').add(
      {name:'Corte Feminino', price:60, duration:45, commission:40, createdAt: Date.now()}
    );
  } catch(e) { showError(friendly(e)); }
}

async function doReset() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showError('Digite seu e-mail para redefinir a senha.'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showError('');
    alert('E-mail de redefinição enviado!');
  } catch(e) { showError(friendly(e)); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const tab = document.getElementById('tabLogin').classList.contains('active');
    tab ? doLogin() : doRegister();
  }
});
</script>
</body>
</html>
